<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Thêm/Sửa danh mục</title>
</head>
<body>
<div layout:fragment="content">
    <h2 th:text="${categoryForm.id} != null ? 'Sửa danh mục' : 'Thêm danh mục'">Thêm danh mục</h2>

    <form th:action="@{/categories}" th:object="${categoryForm}" method="post" class="mt-3" style="max-width: 500px;">
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">Tên danh mục</label>
            <input type="text" class="form-control" th:field="*{name}"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Loại</label>
            <select class="form-select" th:field="*{type}">
                <option value="">-- Chọn loại --</option>
                <option th:each="t : ${types}" th:value="${t}" th:text="${t.name() == 'INCOME' ? 'Thu' : 'Chi'}"></option>
            </select>
            <div class="text-danger small" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Icon (Bootstrap Icons class, ví dụ: bi-cart)</label>
            <input type="text" class="form-control" th:field="*{icon}" placeholder="bi-cart"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Màu (mã hex hoặc tên màu)</label>
            <input type="text" class="form-control" th:field="*{color}" placeholder="#FF5733"/>
        </div>

        <button type="submit" class="btn btn-primary">Lưu</button>
        <a href="/categories" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</body>
</html>
