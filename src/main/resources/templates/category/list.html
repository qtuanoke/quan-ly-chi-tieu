<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Danh mục</title>
    <style>
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;

            padding: 10px 20px;

            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;

            border: none;
            border-radius: 12px;

            font-size: 15px;
            font-weight: 600;

            text-decoration: none;

            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);

            transition: all 0.3s ease;
        }

        .btn-home:hover {
            color: white;

            transform: translateY(-2px);

            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.45);
        }

        .btn-home:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Danh mục chi tiêu</h2>
        <a href="/categories/new" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Thêm danh mục
        </a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <table class="table table-hover align-middle">
        <thead>
        <tr>
            <th>Tên</th>
            <th>Loại</th>
            <th>Icon/Màu</th>
            <th class="text-end">Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.name}">Tên danh mục</td>
            <td>
                <span th:if="${category.type.name() == 'INCOME'}" class="badge bg-success">Thu</span>
                <span th:if="${category.type.name() == 'EXPENSE'}" class="badge bg-danger">Chi</span>
            </td>
            <td>
                <i th:if="${category.icon}" th:class="'bi ' + ${category.icon}"></i>
                <span th:if="${category.color}"
                      th:style="'display:inline-block;width:14px;height:14px;background:' + ${category.color} + ';border-radius:3px;margin-left:6px;'"></span>
            </td>
            <td class="text-end">
                <a th:href="@{/categories/{id}/edit(id=${category.id})}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-pencil"></i> Sửa
                </a>
                <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Bạn có chắc muốn xóa danh mục này?');">
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i> Xóa
                    </button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(categories)}">
            <td colspan="4" class="text-center text-muted">Chưa có danh mục nào.</td>
        </tr>
        </tbody>
    </table>
    <div class="mb-4">
        <a th:href="@{/}" class="btn btn-home">
            <i class="bi bi-house-door-fill"></i>
            Home
        </a>
    </div>
</div>
</body>
</html>
