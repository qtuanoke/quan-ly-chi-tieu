<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Thêm/Sửa giao dịch</title>
</head>
<body>
<div layout:fragment="content">
    <h2 th:text="${transactionForm.id} != null ? 'Sửa giao dịch' : 'Thêm giao dịch'">Thêm giao dịch</h2>

    <form th:action="@{/transactions}" th:object="${transactionForm}" method="post" class="mt-3" style="max-width: 600px;">
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">Loại giao dịch</label>
            <select class="form-select" th:field="*{type}">
                <option value="">-- Chọn loại --</option>
                <option th:each="t : ${types}" th:value="${t}" th:text="${t.name() == 'INCOME' ? 'Thu' : 'Chi'}"></option>
            </select>
            <div class="text-danger small" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Số tiền</label>
            <input type="number" step="1000" min="0" class="form-control" th:field="*{amount}" placeholder="0"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Ngày giao dịch</label>
            <input type="date" class="form-control" th:field="*{transactionDate}"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('transactionDate')}" th:errors="*{transactionDate}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Danh mục</label>
            <select class="form-select" th:field="*{categoryId}">
                <option value="">-- Chọn danh mục --</option>
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
            <div class="text-danger small" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Ví</label>
            <select class="form-select" th:field="*{walletId}">
                <option value="">-- Chọn ví --</option>
                <option th:each="w : ${wallets}" th:value="${w.id}" th:text="${w.name}"></option>
            </select>
            <div class="text-danger small" th:if="${#fields.hasErrors('walletId')}" th:errors="*{walletId}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Ghi chú</label>
            <input type="text" class="form-control" th:field="*{note}"/>
        </div>

        <button type="submit" class="btn btn-primary">Lưu</button>
        <a href="/transactions" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</body>
</html>
