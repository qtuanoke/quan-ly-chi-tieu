<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Thêm/Sửa ví</title>
</head>
<body>
<div layout:fragment="content">
    <h2 th:text="${walletForm.id} != null ? 'Sửa ví' : 'Thêm ví'">Thêm ví</h2>

    <form th:action="@{/wallets}" th:object="${walletForm}" method="post" class="mt-3" style="max-width: 500px;">
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">Tên ví</label>
            <input type="text" class="form-control" th:field="*{name}" placeholder="Ví dụ: Tiền mặt, Vietcombank..."/>
            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Số dư ban đầu</label>
            <input type="number" step="1000" min="0" class="form-control" th:field="*{balance}" placeholder="0"/>
            <div class="text-danger small" th:if="${#fields.hasErrors('balance')}" th:errors="*{balance}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Ghi chú</label>
            <input type="text" class="form-control" th:field="*{note}"/>
        </div>

        <button type="submit" class="btn btn-primary">Lưu</button>
        <a href="/wallets" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</body>
</html>
