<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Ví/Tài khoản</title>
    <style>
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;

            padding: 10px 20px;

            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;

            border: none;
            border-radius: 12px;

            font-size: 15px;
            font-weight: 600;

            text-decoration: none;

            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);

            transition: all 0.3s ease;
        }

        .btn-home:hover {
            color: white;

            transform: translateY(-2px);

            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.45);
        }

        .btn-home:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Ví / Tài khoản</h2>
        <a href="/wallets/new" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Thêm ví
        </a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row">
        <div class="col-md-4 mb-3" th:each="wallet : ${wallets}">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${wallet.name}">Tên ví</h5>
                    <p class="card-text fs-4 fw-bold"
                       th:text="${#numbers.formatDecimal(wallet.balance, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                        0 đ
                    </p>
                    <p class="text-muted small" th:text="${wallet.note}">Ghi chú</p>
                    <a th:href="@{/wallets/{id}/edit(id=${wallet.id})}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-pencil"></i> Sửa
                    </a>
                    <form th:action="@{/wallets/{id}/delete(id=${wallet.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Bạn có chắc muốn xóa ví này?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash"></i> Xóa
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(wallets)}">
            <i class="bi bi-wallet2" style="font-size: 3rem; color: #ccc;"></i>
            <p class="text-muted mt-2">Chưa có ví nào. Hãy tạo ví đầu tiên để bắt đầu!</p>
            <a href="/wallets/new" class="btn btn-primary btn-sm">Tạo ví ngay</a>
        </div>
    </div>
    <div class="mb-4">
        <a th:href="@{/}" class="btn btn-home">
            <i class="bi bi-house-door-fill"></i>
            Home
        </a>
    </div>
</div>
</body>
</html>
